<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>萌趣消消乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{
  background:linear-gradient(160deg,#0f0c29 0%,#302b63 55%,#24243e 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif;
  overflow:hidden;
}

/* ═══════════════════════ LEVEL SELECT ═══════════════════════ */
#scr-lvl{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#0f0c29 0%,#302b63 55%,#24243e 100%);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 14px 30px;overflow-y:auto;z-index:5;
  touch-action:pan-y;-webkit-overflow-scrolling:touch;
}
.logo{font-size:28px;font-weight:900;color:#fff;margin:10px 0 3px;
  text-shadow:0 0 28px rgba(255,200,80,.8),0 2px 12px rgba(0,0,0,.4);}
.logo-sub{color:rgba(255,255,255,.5);font-size:12px;margin-bottom:16px;text-align:center;line-height:1.7;}
.lv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;width:100%;max-width:380px;}
.lv-item{
  aspect-ratio:1;border-radius:15px;border:2px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);color:#fff;font-weight:800;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  cursor:pointer;font-size:20px;transition:transform .12s,opacity .12s;
}
.lv-item:active{transform:scale(.87);}
.lv-item.avail{
  border-color:rgba(255,107,157,.55);background:rgba(255,107,157,.14);
  box-shadow:0 4px 16px rgba(255,107,157,.25);}
.lv-item.done{
  border-color:rgba(80,220,140,.5);background:rgba(50,200,100,.14);
  box-shadow:0 4px 16px rgba(50,200,100,.2);}
.lv-item.locked{opacity:.28;cursor:default;}
.lv-num{font-size:22px;}
.lv-star{font-size:9px;letter-spacing:-1px;opacity:.9;}
.lv-diff{font-size:9px;opacity:.6;margin-top:1px;}

/* ═══════════════════════ GAME SCREEN ═══════════════════════ */
#scr-game{
  display:none;flex-direction:column;align-items:center;
  width:100%;max-width:500px;height:100vh;overflow:hidden;
}

/* HUD */
#hud{width:100%;padding:10px 12px 5px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.hud-r1{display:flex;align-items:center;gap:8px;}
.btn-back{
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);
  color:#fff;border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;
  flex-shrink:0;transition:background .15s;}
.btn-back:active{background:rgba(255,255,255,.18);}
.hud-title{flex:1;text-align:center;color:#fff;font-size:16px;font-weight:800;
  text-shadow:0 0 16px rgba(255,200,80,.5);}
.hud-stats{display:flex;gap:6px;}
.stat-box{
  flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:6px 6px;text-align:center;}
.stat-lbl{color:rgba(255,255,255,.45);font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
.stat-val{font-size:19px;font-weight:900;margin-top:1px;line-height:1.1;}
.stat-val.scr{color:#ffd700;text-shadow:0 0 14px rgba(255,200,0,.4);}
.stat-val.mv{color:#00e5ff;text-shadow:0 0 14px rgba(0,220,255,.35);}
.stat-val.tgt{color:#ff6b9d;text-shadow:0 0 14px rgba(255,100,150,.35);}
.prog-bg{height:6px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.prog-fg{height:100%;background:linear-gradient(90deg,#ff6b9d,#ffd700,#a8ff78);
  border-radius:4px;width:0%;transition:width .4s ease;}

/* BOARD */
#board-w{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  flex:1;width:100%;overflow:hidden;padding:6px 8px;
}
#board{
  display:grid;gap:3px;padding:8px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.11);border-radius:18px;
  touch-action:none;
}

/* TILE */
.t{
  display:flex;align-items:center;justify-content:center;
  border-radius:11px;cursor:pointer;overflow:hidden;
  background:rgba(255,255,255,.09);
  border:1.5px solid rgba(255,255,255,.1);
  position:relative;
  transition:transform .1s ease,box-shadow .1s ease;
}
.t::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 50%);
  border-radius:inherit;pointer-events:none;
}
.t.sel{
  transform:scale(1.13);z-index:5;
  box-shadow:0 0 20px rgba(255,215,0,.9),0 0 40px rgba(255,215,0,.35);
  border-color:#ffd700;background:rgba(255,215,0,.2);
}
.t.ice{background:rgba(130,210,255,.22);border-color:rgba(130,210,255,.55);}
.t.ice::after{
  content:'❄';position:absolute;font-size:10px;
  top:2px;right:3px;opacity:.75;pointer-events:none;line-height:1;
}

/* ═══ Animations ═══ */
@keyframes pop{
  0%  {transform:scale(1) rotate(0deg);opacity:1;}
  35% {transform:scale(1.3) rotate(10deg);opacity:.9;}
  100%{transform:scale(0) rotate(-20deg);opacity:0;}
}
@keyframes dropIn{
  0%  {transform:translateY(-32px) scale(.6);opacity:0;}
  65% {transform:translateY(5px) scale(1.07);opacity:1;}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
@keyframes slideD{
  0%  {transform:translateY(-12px);opacity:.55;}
  100%{transform:translateY(0);opacity:1;}
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20% {transform:translateX(-8px);}
  40% {transform:translateX(8px);}
  60% {transform:translateX(-5px);}
  80% {transform:translateX(5px);}
}
@keyframes floatUp{
  0%  {transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(-60px) scale(.8);opacity:0;}
}
@keyframes comboIn{
  0%  {transform:translate(-50%,-50%) scale(.15) rotate(-20deg);opacity:0;}
  60% {transform:translate(-50%,-50%) scale(1.18) rotate(5deg);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1;}
}
@keyframes sparkle{
  0%  {transform:scale(0) translate(0,0);opacity:1;}
  100%{transform:scale(1) translate(var(--tx),var(--ty));opacity:0;}
}
@keyframes overlayIn{
  0%  {transform:scale(.85);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
.t.a-pop{animation:pop .38s ease-out forwards;pointer-events:none;}
.t.a-drop{animation:dropIn .44s cubic-bezier(.34,1.5,.64,1);}
.t.a-fall{animation:slideD .28s ease;}
.t.a-shake{animation:shake .38s ease;}

/* Score float */
.sf{
  position:fixed;pointer-events:none;z-index:60;
  color:#ffd700;font-weight:900;font-size:20px;
  text-shadow:0 2px 10px rgba(0,0,0,.6),0 0 20px rgba(255,200,0,.5);
  animation:floatUp .85s ease-out forwards;
}
/* Sparkle particles */
.spark{
  position:fixed;pointer-events:none;z-index:59;
  width:8px;height:8px;border-radius:50%;
  animation:sparkle .6s ease-out forwards;
}

/* Combo */
#combo{
  position:fixed;top:46%;left:50%;
  transform:translate(-50%,-50%);
  z-index:70;color:#ffd700;font-weight:900;font-size:38px;
  pointer-events:none;display:none;
  text-shadow:0 0 30px rgba(255,200,0,.9),0 0 60px rgba(255,200,0,.5);
  white-space:nowrap;
}

/* ═══════════════════════ OVERLAY ═══════════════════════ */
#overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.84);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;
}
.ov-box{
  background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.22);border-radius:26px;
  padding:36px 22px;text-align:center;max-width:310px;width:90%;
  animation:overlayIn .35s ease;
}
.ov-em{font-size:70px;margin-bottom:10px;line-height:1;}
.ov-title{color:#fff;font-size:27px;font-weight:900;margin-bottom:7px;}
.ov-sub{color:rgba(255,255,255,.6);font-size:15px;margin-bottom:5px;}
.ov-stars{font-size:28px;letter-spacing:6px;margin-bottom:20px;}
.btn{
  display:inline-block;padding:12px 26px;border-radius:50px;border:none;
  font-size:15px;font-weight:700;cursor:pointer;margin:4px;
  transition:transform .1s,box-shadow .1s;}
.btn:active{transform:scale(.93);}
.btn-p{
  background:linear-gradient(135deg,#ff6b9d,#c44dff);color:#fff;
  box-shadow:0 4px 18px rgba(255,107,157,.45);}
.btn-g{
  background:rgba(255,255,255,.1);color:#fff;
  border:1px solid rgba(255,255,255,.22);}
</style>
</head>
<body>

<!-- ══════════ LEVEL SELECT ══════════ -->
<div id="scr-lvl">
  <div class="logo">🎮 萌趣消消乐</div>
  <div class="logo-sub">第1关超简单入门，越往后越难<br>第10关几乎不可能通过！</div>
  <div class="lv-grid" id="lv-grid"></div>
</div>

<!-- ══════════ GAME SCREEN ══════════ -->
<div id="scr-game">
  <div id="hud">
    <div class="hud-r1">
      <button class="btn-back" id="btn-back">← 关卡</button>
      <div class="hud-title" id="hud-title">第 1 关</div>
    </div>
    <div class="hud-stats">
      <div class="stat-box">
        <div class="stat-lbl">分数</div>
        <div class="stat-val scr" id="hud-score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">目标</div>
        <div class="stat-val tgt" id="hud-tgt">600</div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">步数</div>
        <div class="stat-val mv" id="hud-mv">35</div>
      </div>
    </div>
    <div class="prog-bg"><div class="prog-fg" id="prog"></div></div>
  </div>
  <div id="board-w">
    <div id="board"></div>
  </div>
</div>

<!-- Combo display -->
<div id="combo"></div>

<!-- ══════════ OVERLAY ══════════ -->
<div id="overlay">
  <div class="ov-box">
    <div class="ov-em"  id="ov-em">🎉</div>
    <div class="ov-title" id="ov-title">恭喜过关！</div>
    <div class="ov-sub"   id="ov-sub">得分 1200</div>
    <div class="ov-stars" id="ov-stars">⭐⭐⭐</div>
    <div>
      <button class="btn btn-p" id="btn-nxt">下一关 →</button>
      <button class="btn btn-g" id="btn-retry">重试</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════ */

// 12 emoji: 5 fruits + 4 animals + 3 anime characters
const EMOJI = [
  '🍎','🍊','🍋','🍇','🍓',   // 0-4  fruits
  '🐶','🐱','🐼','🦊',         // 5-8  animals
  '🤖','👾','🎭',               // 9-11 anime
];

// Level config: [rows, cols, types, moves, target, iceCount]
// Difficulty ramps sharply: more types = harder matching
const LEVELS = [
  [ 6,  6,  4, 35,   600,  0],  // 1  ⭐ 入门
  [ 6,  6,  5, 28,  1200,  0],  // 2  ⭐⭐
  [ 7,  7,  5, 25,  2200,  3],  // 3  ⭐⭐⭐
  [ 7,  7,  6, 22,  3200,  5],  // 4  ⭐⭐⭐
  [ 7,  7,  6, 20,  4500,  8],  // 5  ⭐⭐⭐⭐
  [ 8,  8,  7, 18,  6000, 11],  // 6  ⭐⭐⭐⭐
  [ 8,  8,  7, 16,  7800, 13],  // 7  ⭐⭐⭐⭐⭐
  [ 8,  8,  8, 14,  9800, 15],  // 8  💀
  [ 8,  8,  8, 11, 12500, 17],  // 9  💀
  [ 9,  9, 11,  9, 20000, 22],  // 10 💀 噩梦
];

const DIFF_LABELS = ['⭐入门','⭐⭐','⭐⭐⭐','⭐⭐⭐','⭐⭐⭐⭐','⭐⭐⭐⭐','⭐⭐⭐⭐⭐','💀','💀','💀噩梦'];
const SPARK_COLORS = ['#ff6b9d','#ffd700','#00e5ff','#a8ff78','#c44dff','#ff9f43'];

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let gLv = 0, gScore = 0, gMoves = 0, gBusy = false, gSel = null;
let grid = []; // grid[r][c] = {type, ice, el}

// Persist progress
let completed = [], stars = [];
try {
  completed = JSON.parse(localStorage.getItem('mxll_c') || '[]');
  stars     = JSON.parse(localStorage.getItem('mxll_s') || '[]');
} catch(e) {}
while (completed.length < 10) completed.push(false);
while (stars.length     < 10) stars.push(0);

const saveProgress = () => {
  try {
    localStorage.setItem('mxll_c', JSON.stringify(completed));
    localStorage.setItem('mxll_s', JSON.stringify(stars));
  } catch(e) {}
};

/* ═══════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const lv = () => LEVELS[gLv];

/* ═══════════════════════════════════════════════════════════
   LEVEL SELECT
═══════════════════════════════════════════════════════════ */
function buildLvSelect() {
  const g = $('lv-grid');
  g.innerHTML = '';
  for (let i = 0; i < LEVELS.length; i++) {
    const unlocked = i === 0 || completed[i - 1];
    const done = completed[i];
    const el = document.createElement('div');
    el.className = 'lv-item ' + (done ? 'done' : unlocked ? 'avail' : 'locked');
    const st = stars[i] || 0;
    el.innerHTML =
      `<span class="lv-num">${i + 1}</span>` +
      `<span class="lv-star">${done ? '⭐'.repeat(st) + '☆'.repeat(3 - st) : (unlocked ? '▶' : '🔒')}</span>` +
      `<span class="lv-diff">${done || unlocked ? DIFF_LABELS[i] : ''}</span>`;
    if (unlocked) el.addEventListener('pointerup', () => startLevel(i));
    g.appendChild(el);
  }
}

/* ═══════════════════════════════════════════════════════════
   INIT LEVEL
═══════════════════════════════════════════════════════════ */
function startLevel(idx) {
  gLv = idx;
  gScore = 0;
  gMoves = lv()[3];
  gBusy = false;
  gSel = null;

  $('scr-lvl').style.display = 'none';
  $('scr-game').style.display = 'flex';
  $('overlay').style.display = 'none';
  $('hud-title').textContent = `第 ${idx + 1} 关`;
  $('hud-tgt').textContent = lv()[4].toLocaleString();
  updateHUD();
  buildBoard();
}

let CSIZ = 54; // cell size px (set dynamically)

function buildBoard() {
  const [rows, cols, types, , , iceN] = lv();
  const brd = $('board');
  brd.innerHTML = '';

  // Responsive cell size
  const maxW = Math.min(window.innerWidth - 20, 480) - 20;
  CSIZ = Math.floor((maxW - (cols - 1) * 3) / cols);
  CSIZ = Math.max(32, Math.min(CSIZ, 64));
  const fz = Math.max(16, Math.floor(CSIZ * 0.54));

  brd.style.gridTemplateColumns = `repeat(${cols},${CSIZ}px)`;
  brd.style.gridTemplateRows    = `repeat(${rows},${CSIZ}px)`;

  // Init grid data
  grid = Array.from({length: rows}, () =>
    Array.from({length: cols}, () => ({type: -1, ice: false, el: null}))
  );

  // Place ice tiles
  const iceSet = new Set();
  while (iceSet.size < iceN) iceSet.add(Math.floor(Math.random() * rows * cols));

  // Fill types (avoid pre-existing matches)
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      grid[r][c].type = pickType(r, c, types);
      grid[r][c].ice  = iceSet.has(r * cols + c);
    }

  // Build DOM
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const el = document.createElement('div');
      el.className = 't' + (grid[r][c].ice ? ' ice' : '');
      el.style.cssText = `font-size:${fz}px;width:${CSIZ}px;height:${CSIZ}px;`;
      el.textContent = EMOJI[grid[r][c].type];
      el.dataset.r = r;
      el.dataset.c = c;
      brd.appendChild(el);
      grid[r][c].el = el;
    }
}

function pickType(r, c, types) {
  const bad = new Set();
  if (c >= 2 && grid[r][c-1].type === grid[r][c-2].type && grid[r][c-1].type >= 0)
    bad.add(grid[r][c-1].type);
  if (r >= 2 && grid[r-1][c].type === grid[r-2][c].type && grid[r-1][c].type >= 0)
    bad.add(grid[r-1][c].type);
  let t, n = 0;
  do { t = Math.floor(Math.random() * types); n++; } while (bad.has(t) && n < 60);
  return t;
}

/* ═══════════════════════════════════════════════════════════
   INPUT (pointer events – works for mouse & touch)
═══════════════════════════════════════════════════════════ */
let pdTile = null, pdPos = null;
const brd = $('board');

brd.addEventListener('pointerdown', e => {
  const el = e.target.closest('.t');
  if (!el || gBusy) return;
  brd.setPointerCapture(e.pointerId);
  pdTile = el;
  pdPos = {x: e.clientX, y: e.clientY};
  e.preventDefault();
}, {passive: false});

brd.addEventListener('pointerup', e => {
  if (!pdTile) return;
  const dx = e.clientX - pdPos.x;
  const dy = e.clientY - pdPos.y;
  const dist = Math.hypot(dx, dy);

  if (dist < 12) {
    // Tap → select
    handleSel(+pdTile.dataset.r, +pdTile.dataset.c);
  } else {
    // Swipe → direct swap
    const r1 = +pdTile.dataset.r, c1 = +pdTile.dataset.c;
    let r2 = r1, c2 = c1;
    if (Math.abs(dx) > Math.abs(dy)) c2 += dx > 0 ? 1 : -1;
    else                              r2 += dy > 0 ? 1 : -1;
    const [rows, cols] = lv();
    if (r2 >= 0 && r2 < rows && c2 >= 0 && c2 < cols) {
      desel();
      attemptSwap(r1, c1, r2, c2);
    }
  }
  pdTile = null; pdPos = null;
});

brd.addEventListener('pointermove', e => { if (pdTile) e.preventDefault(); }, {passive: false});
brd.addEventListener('pointercancel', () => { pdTile = null; pdPos = null; });

function handleSel(r, c) {
  if (gBusy) return;
  if (!gSel) {
    gSel = {r, c};
    grid[r][c].el.classList.add('sel');
  } else if (gSel.r === r && gSel.c === c) {
    desel();
  } else if (Math.abs(gSel.r - r) + Math.abs(gSel.c - c) === 1) {
    const {r: r1, c: c1} = gSel;
    desel();
    attemptSwap(r1, c1, r, c);
  } else {
    desel();
    gSel = {r, c};
    grid[r][c].el.classList.add('sel');
  }
}

function desel() {
  if (gSel) {
    grid[gSel.r]?.[gSel.c]?.el?.classList.remove('sel');
    gSel = null;
  }
}

/* ═══════════════════════════════════════════════════════════
   SWAP
═══════════════════════════════════════════════════════════ */
async function attemptSwap(r1, c1, r2, c2) {
  gBusy = true;
  await animSwap(r1, c1, r2, c2);
  doSwap(r1, c1, r2, c2);

  const matches = findMatches();
  if (!matches.length) {
    // Invalid – swap back
    await animSwap(r1, c1, r2, c2);
    doSwap(r1, c1, r2, c2);
    doShake(r1, c1);
    doShake(r2, c2);
    gBusy = false;
    return;
  }

  gMoves--;
  updateHUD();
  await cascade(matches, 1);
  gBusy = false;
  checkEnd();
}

function doSwap(r1, c1, r2, c2) {
  const a = grid[r1][c1], b = grid[r2][c2];
  [a.type, b.type] = [b.type, a.type];
  a.el.textContent = EMOJI[a.type];
  b.el.textContent = EMOJI[b.type];
}

function animSwap(r1, c1, r2, c2) {
  const e1 = grid[r1][c1].el, e2 = grid[r2][c2].el;
  const rc1 = e1.getBoundingClientRect(), rc2 = e2.getBoundingClientRect();
  const dx = rc2.left - rc1.left, dy = rc2.top - rc1.top;
  return new Promise(res => {
    e1.style.transition = 'transform .17s ease';
    e1.style.transform  = `translate(${dx}px,${dy}px)`;
    e1.style.zIndex = '10';
    e2.style.transition = 'transform .17s ease';
    e2.style.transform  = `translate(${-dx}px,${-dy}px)`;
    setTimeout(() => {
      e1.style.transition = e1.style.transform = e1.style.zIndex = '';
      e2.style.transition = e2.style.transform = '';
      res();
    }, 185);
  });
}

function doShake(r, c) {
  const el = grid[r][c].el;
  el.classList.remove('a-shake');
  void el.offsetWidth;
  el.classList.add('a-shake');
  setTimeout(() => el.classList.remove('a-shake'), 400);
}

/* ═══════════════════════════════════════════════════════════
   MATCH DETECTION
═══════════════════════════════════════════════════════════ */
function findMatches() {
  const [rows, cols] = lv();
  const set = new Set();

  // Horizontal
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols - 2; c++) {
      const t = grid[r][c].type;
      if (t < 0) continue;
      if (grid[r][c+1].type === t && grid[r][c+2].type === t) {
        let e = c + 2;
        while (e + 1 < cols && grid[r][e+1].type === t) e++;
        for (let k = c; k <= e; k++) set.add(r * 100 + k);
        c = e;
      }
    }

  // Vertical
  for (let c = 0; c < cols; c++)
    for (let r = 0; r < rows - 2; r++) {
      const t = grid[r][c].type;
      if (t < 0) continue;
      if (grid[r+1][c].type === t && grid[r+2][c].type === t) {
        let e = r + 2;
        while (e + 1 < rows && grid[e+1][c].type === t) e++;
        for (let k = r; k <= e; k++) set.add(k * 100 + c);
        r = e;
      }
    }

  return [...set].map(k => ({r: Math.floor(k / 100), c: k % 100}));
}

/* ═══════════════════════════════════════════════════════════
   CASCADE: eliminate → gravity → fill → repeat
═══════════════════════════════════════════════════════════ */
async function cascade(matches, combo) {
  const [rows, cols, types] = lv();

  // Score calculation (combo multiplier)
  const pts = matches.length * 50 * combo;
  gScore += pts;
  updateHUD();

  if (combo > 1) showCombo(combo);
  showFloat(matches[Math.floor(matches.length / 2)], pts, combo);
  if (combo >= 2) emitSparks(matches[Math.floor(matches.length / 2)]);

  // Crack adjacent ice tiles
  matches.forEach(({r, c}) => {
    [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr, nc]) => {
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc].ice) {
        grid[nr][nc].ice = false;
        grid[nr][nc].el.classList.remove('ice');
      }
    });
  });

  // ── Pop animation ──
  matches.forEach(({r, c}) => grid[r][c].el.classList.add('a-pop'));
  await sleep(400);

  // Remove matched tiles from data
  matches.forEach(({r, c}) => {
    grid[r][c].type = -1;
    const el = grid[r][c].el;
    el.className = 't';
    el.textContent = '';
    el.style.opacity = '0';
  });

  await sleep(30);

  // ── Gravity + fill per column ──
  for (let c = 0; c < cols; c++) compactColumn(c, rows, types);

  await sleep(420);

  // ── Cascade check ──
  const nxt = findMatches();
  if (nxt.length) {
    await sleep(80);
    await cascade(nxt, combo + 1);
  }
}

function compactColumn(c, rows, types) {
  // Collect non-empty tiles (bottom to top)
  const col = [];
  for (let r = 0; r < rows; r++)
    if (grid[r][c].type >= 0)
      col.push({type: grid[r][c].type, ice: grid[r][c].ice, fromR: r});

  // Fill from bottom with existing tiles
  let wr = rows - 1;
  for (let i = col.length - 1; i >= 0; i--, wr--) {
    const cell = grid[wr][c];
    const src  = col[i];
    cell.type = src.type;
    cell.ice  = src.ice;
    cell.el.textContent  = EMOJI[cell.type];
    cell.el.style.opacity = '1';
    if (cell.ice) cell.el.classList.add('ice');
    else          cell.el.classList.remove('ice');
    if (src.fromR !== wr) {
      // Tile fell down – play slide animation
      cell.el.className = 't' + (cell.ice ? ' ice' : '');
      void cell.el.offsetWidth;
      cell.el.classList.add('a-fall');
    }
  }

  // Fill top with brand-new random tiles
  for (let r = wr; r >= 0; r--) {
    const cell = grid[r][c];
    cell.type = Math.floor(Math.random() * types);
    cell.ice  = false;
    cell.el.textContent  = EMOJI[cell.type];
    cell.el.style.opacity = '1';
    cell.el.className = 't a-drop';
    // Remove animation class after it finishes
    setTimeout(() => cell.el.classList.remove('a-drop'), 500);
  }
}

/* ═══════════════════════════════════════════════════════════
   HUD
═══════════════════════════════════════════════════════════ */
function updateHUD() {
  $('hud-score').textContent = gScore.toLocaleString();
  $('hud-mv').textContent    = gMoves;
  $('prog').style.width = Math.min(100, gScore / lv()[4] * 100) + '%';

  // Flash moves red when low
  const mv = $('hud-mv');
  mv.style.color = gMoves <= 5 ? '#ff4444' : '';
}

function showFloat({r, c}, pts, combo) {
  if (!grid[r]?.[c]?.el) return;
  const rc = grid[r][c].el.getBoundingClientRect();
  const f  = document.createElement('div');
  f.className = 'sf';
  f.textContent = (combo > 1 ? `×${combo} ` : '') + '+' + pts;
  f.style.left  = (rc.left + rc.width / 2) + 'px';
  f.style.top   = rc.top + 'px';
  f.style.transform = 'translateX(-50%)';
  if (combo >= 3) f.style.fontSize = '26px';
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 950);
}

function emitSparks({r, c}) {
  if (!grid[r]?.[c]?.el) return;
  const rc = grid[r][c].el.getBoundingClientRect();
  const cx = rc.left + rc.width / 2;
  const cy = rc.top  + rc.height / 2;
  for (let i = 0; i < 8; i++) {
    const sp   = document.createElement('div');
    const ang  = (i / 8) * Math.PI * 2;
    const dist = 30 + Math.random() * 30;
    sp.className = 'spark';
    sp.style.cssText =
      `left:${cx}px;top:${cy}px;` +
      `background:${SPARK_COLORS[i % SPARK_COLORS.length]};` +
      `--tx:${Math.cos(ang) * dist}px;--ty:${Math.sin(ang) * dist}px;`;
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 650);
  }
}

let comboTimer = null;
function showCombo(n) {
  const el = $('combo');
  el.textContent = `🔥 ${n} 连击！`;
  el.style.display = 'block';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'comboIn .45s ease';
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { el.style.display = 'none'; }, 1050);
}

/* ═══════════════════════════════════════════════════════════
   END CONDITIONS
═══════════════════════════════════════════════════════════ */
function checkEnd() {
  const target = lv()[4];

  if (gScore >= target) {
    const st = gScore >= target * 2 ? 3 : gScore >= target * 1.5 ? 2 : 1;
    completed[gLv] = true;
    stars[gLv]     = Math.max(stars[gLv] || 0, st);
    saveProgress();
    setTimeout(() => showOverlay(true, st), 250);
    return;
  }
  if (gMoves <= 0) {
    setTimeout(() => showOverlay(false, 0), 250);
  }
}

function showOverlay(win, st) {
  $('ov-em').textContent    = win ? ['🎉','🌟','👑'][st - 1] : '😭';
  $('ov-title').textContent = win
    ? ['恭喜过关！','太棒了！','完美通关！'][st - 1]
    : '步数耗尽！';
  $('ov-sub').textContent   = win
    ? `得分 ${gScore.toLocaleString()}`
    : `差 ${(lv()[4] - gScore).toLocaleString()} 分过关`;
  $('ov-stars').textContent = win ? '⭐'.repeat(st) + '☆'.repeat(3 - st) : '☆☆☆';

  const nb = $('btn-nxt');
  if (win && gLv < LEVELS.length - 1) {
    nb.textContent = '下一关 →';
    nb.style.display = 'inline-block';
  } else if (win) {
    nb.textContent = '返回关卡';
    nb.style.display = 'inline-block';
  } else {
    nb.style.display = 'none';
  }

  $('overlay').style.display = 'flex';
}

/* ═══════════════════════════════════════════════════════════
   BUTTON HANDLERS
═══════════════════════════════════════════════════════════ */
$('btn-nxt').addEventListener('click', () => {
  $('overlay').style.display = 'none';
  if (completed[gLv] && gLv < LEVELS.length - 1) {
    startLevel(gLv + 1);
  } else {
    $('scr-game').style.display = 'none';
    $('scr-lvl').style.display  = 'flex';
    buildLvSelect();
  }
});

$('btn-retry').addEventListener('click', () => {
  $('overlay').style.display = 'none';
  startLevel(gLv);
});

$('btn-back').addEventListener('click', () => {
  $('scr-game').style.display = 'none';
  $('scr-lvl').style.display  = 'flex';
  buildLvSelect();
});

/* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
buildLvSelect();
</script>
